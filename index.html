<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My First Website</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f4f4f4;
        }

        header {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 20px;
        }

        nav {
            background-color: #444;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 15px;
        }

        section {
            max-width: 800px;
            margin: 20px auto;
            background-color: white;
            padding: 20px;
            border-radius: 10px;
        }

        footer {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 15px;
            margin-top: 20px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <header>
        <h1>Welcome to My Website</h1>
        <p>My first website hosted on GitHub Pages 🚀</p>
    </header>

    <nav>
        <a href="#about">About</a>
        <a href="#contact">Contact</a>
    </nav>

    <section id="about">
        <h2>About Me</h2>
        <p>
            Hello! My name is Pratham. I am learning web development,
            trading, and building online projects.
        </p>
    </section>

    <section>
        <h2>My First Button</h2>
        <button onclick="showMessage()">Click Me</button>
    </section>

    <section id="contact">
        <h2>Contact</h2>
        <p>Email: your-email@example.com</p>
    </section>

    <footer>
        <p>© 2026 My First Website</p>
    </footer>

    <script>
        function showMessage() {
            alert("Hello! Thanks for visiting my website.");
        }
    </script>

</body>
</html>
